<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="assets/frog icon.webp" type="image/x-icon">
    <title>Sapo corre uma maratona</title>
</head>

<body>
    <main>
        <div class="textDisplay">
            <h2 id="stepL">Faltando:42195</h2>
            <div class="distanceLeft">
                <img src="assets/frog icon.webp" alt="">
                <progress id="progressBar" max="1" value="0"></progress>
            </div>
        </div>
        <div class="frogBtn">
            <img id="frog" onclick="move()" src="assets/frog.webp" alt="sapo">
            </a>
        </div>

        <div class="coinsDisplay">
            <h2>Motivação:</h2>
            <div class="valor">
                <h2 id="coins">0</h2>
            </div>
        </div>
        <div class="upgradeMenu">
            <div class="upgradesList">
                <button type="button" onclick="valCoinUp()">
                    <div>
                        <h2>musíca de academia</h2>
                        <p class="flavorText">"A motivação aumentou. A vontade de treinar ainda está carregando.."</p>
                        <p>Ganho de motivação +1</p>
                    </div>
                    <div><!-- imagem placeholder-->
                        <img src="assets/frog icon.webp" alt="jump coin">
                        <p id="valor1">10</p>
                    </div>
                </button>
                <button type="button" onclick="jmpDis()">
                    <div>
                        <h2>Pulos Mais Altos</h2>
                        <p class="flavorText">"Cuidado ao pular, o satélite pode cobrar pedágio."</p>
                        <p>Aumenta a altura dos seus pulos</p>
                    </div>
                    <div>
                        <img src="assets/frog icon.webp" alt="jump coin">
                        <p id="valor2">20</p>
                    </div>
                </button>
                <button type="button" onclick="autoJmp()">
                    <div>
                        <h2>Momentum</h2>
                        <p class="flavorText">"1ª lei de newton, uma vez que começou, é dificil parar"</p>
                        <p>Pula automaticamente a cada 10 segundos</p>
                    </div>
                    <div>
                        <img src="assets/frog icon.webp" alt="jump coin">
                        <p id="valor3">30</p>
                    </div>
                </button>
                <button type="button" onclick="valCoinMult()">
                    <div>
                        <h2>frases motivacionais</h2>
                        <p class="flavorText">"Seja a mudança que você quer ver nos seus pontos."</p>
                        <p>multiplica o ganho de pontos em 25%</p>
                    </div>
                    <div>
                        <img src="assets/frog icon.webp" alt="jump coin">
                        <p id="valor4">30</p>
                    </div>
                </button>
                <button type="button" onclick="jmpHgt()">
                    <div>
                        <h2>Salto Lunar</h2>
                        <p class="flavorText">"Você pulou tão longe que o mapa precisou carregar."</p>
                        <p>Aumenta a distância percorrida a cada salto.</p>
                    </div>
                    <div>
                        <img src="assets/frog icon.webp" alt="jump coin">
                        <p id="valor5">40</p>
                    </div>
                </button>
                </ul>
            </div>
        </div>

        <div id="chao" class="ground">
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
